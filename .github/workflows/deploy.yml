name: "Publish metadata to GitHub Releases"

# The old mtgatool.com FTP/API publishing route is being sunset. Metadata is now
# generated in CI and published as GitHub Release assets, served from the stable
# URL https://github.com/mtgatool/mtgatool-metadata/releases/latest/download/...
on:
  push:
    tags: "v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  publish:
    name: Generate + publish (${{ github.sha }})
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Read database version
        id: v
        run: |
          echo "version=$(node -p "require('./package.json').version.split('.')[0]")" >> "$GITHUB_OUTPUT"

      - name: Install deps
        run: npm install --legacy-peer-deps

      - name: Generate metadata
        run: |
          npm run start
          npm run dist

      # getSetIcons only fetches icons for sets missing from set-icons.json.
      # When it resolves new sets it grows the cache; commit it back so future
      # builds reuse it and never re-ping Scryfall. Only meaningful on a branch
      # run (workflow_dispatch); tag pushes are detached and skip this.
      # Best-effort: master requires PRs, so the built-in GITHUB_TOKEN usually
      # can't push here. That's fine — the cache is seeded/refreshed by a
      # maintainer commit (see scripts/seedSetIcons). This step only opportun-
      # istically lands newly-fetched icons and must never fail the publish.
      - name: Persist newly-cached set icons
        if: github.event_name == 'workflow_dispatch'
        continue-on-error: true
        run: |
          # Stage first: set-icons.json may be brand new (untracked), which a
          # plain `git diff` does not report. --cached catches new + modified.
          git add set-icons.json 2>/dev/null || true
          if git diff --cached --quiet -- set-icons.json; then
            echo "No new set icons to cache."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: cache set icons for new sets [skip ci]"
            git push origin "HEAD:${{ github.ref_name }}" \
              || echo "Could not push cache (branch protection?) — seed set-icons.json manually."
          fi

      - name: Stage release assets (stable, unversioned names)
        run: |
          mkdir -p release
          cp output/latest.json release/latest.json
          for f in output/${{ steps.v.outputs.version }}/v${{ steps.v.outputs.version }}-*-database.json; do
            [ -e "$f" ] || continue
            base=$(basename "$f")
            lang=$(echo "$base" | sed -E 's/^v[0-9]+-([a-z]+)-database\.json$/\1/')
            cp "$f" "release/${lang}-database.json"
          done
          ls -la release

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.v.outputs.version }}
          name: Metadata v${{ steps.v.outputs.version }}
          files: release/*
          make_latest: true

      # Mirror the same files into a public Supabase Storage bucket so the WEB
      # app (app.mtgatool.com) can fetch them — GitHub release assets send no
      # CORS headers, so browsers can't. The per-language DBs (~25MB) are
      # uploaded GZIPPED (~6x smaller) to keep Storage egress down; the web
      # client inflates them (see database-wrapper.ts). latest.json stays raw.
      # No-op if the secret isn't configured, so it never blocks a release.
      - name: Mirror metadata to Supabase Storage (gzipped)
        env:
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: |
          if [ -z "$SUPABASE_SECRET_KEY" ]; then
            echo "SUPABASE_SECRET_KEY not set; skipping Supabase mirror."
            exit 0
          fi
          base="https://decenyvqkbvydrrolwpk.supabase.co/storage/v1/object/metadata"
          upload() { # <file> <object-name> <content-type>
            curl -sS --fail -X POST "$base/$2" \
              -H "Authorization: Bearer $SUPABASE_SECRET_KEY" \
              -H "Content-Type: $3" \
              -H "cache-control: max-age=300" \
              -H "x-upsert: true" \
              --data-binary "@$1"
            echo "  uploaded $2"
          }
          upload release/latest.json latest.json application/json
          for f in release/*-database.json; do
            [ -e "$f" ] || continue
            name=$(basename "$f")
            gzip -kf "$f"                       # -> $f.gz (keeps original)
            upload "$f.gz" "$name.gz" application/gzip
          done
